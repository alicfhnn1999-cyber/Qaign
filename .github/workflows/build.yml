name: Build ESignClone

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      SCHEME: ESignClone
      PROJECT: ESignClone.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # بناء بدون توقيع (Debug) للتأكد من أن الكود يترجم بنجاح على كل Pull Request
      - name: Build (unsigned, for verification)
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

      # ==== الجزء التالي اختياري: أرشفة وتوقيع حقيقي للحصول على ملف IPA ====
      # لتفعيله أضف الأسرار التالية في Settings > Secrets and variables > Actions:
      #   BUILD_CERTIFICATE_BASE64      -> شهادة .p12 مُرمّزة base64
      #   P12_PASSWORD                  -> كلمة مرور ملف p12
      #   BUILD_PROVISION_PROFILE_BASE64 -> ملف .mobileprovision مُرمّز base64
      #   KEYCHAIN_PASSWORD             -> أي كلمة مرور عشوائية لسلسلة المفاتيح المؤقتة
      - name: Import signing certificate & profile
        if: ${{ github.event_name == 'workflow_dispatch' && vars.ENABLE_SIGNING == 'true' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive & Export IPA (signed)
        if: ${{ github.event_name == 'workflow_dispatch' && vars.ENABLE_SIGNING == 'true' }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath $RUNNER_TEMP/ESignClone.xcarchive \
            -destination "generic/platform=iOS"

          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ESignClone.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA artifact
        if: ${{ github.event_name == 'workflow_dispatch' && vars.ENABLE_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ESignClone-signed-ipa
          path: ${{ runner.temp }}/export/*.ipa
