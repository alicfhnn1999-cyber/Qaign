name: Build ESignClone

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      SCHEME: ESignClone
      PROJECT: ESignClone.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show Xcode version
        run: xcodebuild -version

      # بناء بدون توقيع (Debug) للتأكد من أن الكود يترجم بنجاح على كل Pull Request
      - name: Build (unsigned, for verification)
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

      # ==== أرشفة وتوقيع حقيقي للحصول على ملف IPA عند الإطلاق المباشر ====
      - name: Archive & Export IPA (signed)
        if: ${{ github.event_name == 'workflow_dispatch' && vars.ENABLE_SIGNING == 'true' }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath $RUNNER_TEMP/ESignClone.xcarchive \
            -destination "generic/platform=iOS"

          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ESignClone.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA artifact
        if: ${{ github.event_name == 'workflow_dispatch' && vars.ENABLE_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ESignClone-Signed
          path: ${{ Trinity_TEMP }}/export/*.ipa
